<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comunicador Jesús V7</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial;background:#f3f7f6;color:#123}
header{background:#0f766e;color:white;padding:14px;position:sticky;top:0;z-index:2}
h1{font-size:20px;margin:0}.sub{font-size:13px;opacity:.9}
main{padding:12px;max-width:900px;margin:auto}
.card{background:white;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 6px 18px #0001}
.label{font-size:13px;color:#667;margin-bottom:6px}
#sentence{font-size:25px;font-weight:900;min-height:34px}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
button{border:0;border-radius:17px;padding:12px 8px;min-height:56px;font-size:16px;font-weight:800;background:white;box-shadow:0 6px 18px #0001}
.primary{background:#0f766e;color:white}.soft{background:#dff7f4;color:#064e4b}.danger{background:#fee2e2;color:#991b1b}
.path{font-size:15px;color:#466;font-weight:800;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:white;border-radius:20px;padding:12px;min-height:118px;box-shadow:0 6px 18px #0001;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:7px}
.tile.main{background:#ecfeff}.tile.food{background:#fff7ed}.tile.emotion{background:#fef3c7}.tile.pain{background:#fee2e2}
.emoji{font-size:38px}.txt{font-size:18px;font-weight:900}.hint{font-size:13px;color:#667;font-weight:700}
.quickgrid{display:grid;grid-template-columns:1fr;gap:8px}.quickbtn{text-align:left;background:#fff7ed;color:#7c2d12}
.entry{border-top:1px solid #eee;padding:8px 0}
.footer{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
main{margin-bottom:82px}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.quickgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><h1>🧠 Comunicador Jesús V7</h1><div class="sub">Comunicación guiada por intención · voz · diario · avatar básico</div></header>
<main>
<section class="card"><div class="label">Frase de Jesús</div><div id="sentence">Toca una intención para empezar</div></section>
<div class="actions">
<button class="primary" onclick="speak()">🔊 Hablar</button>
<button class="soft" onclick="clearSentence()">🧹 Borrar</button>
<button class="soft" onclick="saveDiary()">💾 Guardar</button>
<button class="danger" onclick="setFinal('Necesito ayuda. Me pasa algo.')">🆘 Ayuda</button>
</div>
<section class="card"><div class="path" id="path">Inicio</div><div class="grid" id="grid"></div></section>
<section class="card"><b>⚡ Frases rápidas</b><div class="quickgrid" id="quick"></div></section>
<section class="card"><b>📓 Diario</b><div id="diary"></div></section>
</main>
<div class="footer"><button onclick="setFinal('Sí.')">✅ Sí</button><button onclick="setFinal('No.')">❌ No</button><button onclick="go('home')">🏠 Inicio</button></div>

<script>
let sentence="", screen="home";
const quick=["Quiero beber agua.","Quiero comer yogur.","Quiero descansar.","Estoy cansado.","Me duele algo.","Quiero ir con mamá."];


 const [path,items]=screens[screen]; document.getElementById("path").textContent=path;
 const grid=document.getElementById("grid"); grid.innerHTML="";
 items.forEach(([e,t,a,c])=>{
  let d=document.createElement("div"); d.className="tile "+c; d.onclick=()=>handle(a);
  d.innerHTML=`<div class="emoji">${e}</div><div class="txt">${t}</div><div class="hint">tocar</div>`;
  grid.appendChild(d);
 });
}
function handle(a){ if(a.startsWith("final:")) setFinal(a.slice(6)); else go(a); }
function go(s){screen=s;render();}
function setFinal(t){sentence=t;document.getElementById("sentence").textContent=t;speakText(t);}
function clearSentence(){sentence="";document.getElementById("sentence").textContent="Toca una intención para empezar";}
function speak(){let t=document.getElementById("sentence").textContent;if(!t.includes("Toca una intención"))speakText(t);}
function speakText(t){
 try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang="es-ES";u.rate=.88;u.pitch=1.05;
 let vs=speechSynthesis.getVoices();let v=vs.find(x=>x.lang&&x.lang.toLowerCase().startsWith("es"));if(v)u.voice=v;
 speechSynthesis.speak(u);}catch(e){alert("No se ha podido reproducir la voz.");}
}
function renderQuick(){
 const q=document.getElementById("quick"); q.innerHTML="";
 quick.forEach(t=>{let b=document.createElement("button");b.className="quickbtn";b.textContent=t;b.onclick=()=>setFinal(t);q.appendChild(b);});
}
function saveDiary(){
 if(!sentence)return;let d=JSON.parse(localStorage.getItem("jesus_diary_v7")||"[]");
 d.unshift({text:sentence,time:new Date().toLocaleString("es-ES")});
 localStorage.setItem("jesus_diary_v7",JSON.stringify(d.slice(0,80)));renderDiary();
}
function renderDiary(){
 let d=JSON.parse(localStorage.getItem("jesus_diary_v7")||"[]"), box=document.getElementById("diary");
 box.innerHTML=d.length?d.map(x=>`<div class="entry"><b>${x.text}</b><br><span class="hint">${x.time}</span></div>`).join(""):'<div class="hint">Aún no hay frases guardadas.</div>';
}
render();renderQuick();renderDiary();
</script>
</body>
</html>
